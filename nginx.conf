server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Assets Vite avec hash dans le nom : cache long
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Données des pals possédés, rafraîchies par sync-owned : jamais en cache
    location = /owned.json {
        add_header Cache-Control "no-store";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
