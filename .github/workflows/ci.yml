name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests de la logique de breeding
        run: npm test

      - name: Build de production (avec vérification des types)
        run: npm run build
